spring:
  application:
    name: CartService

  jpa:
    hibernate:
      ddl-auto: update
  datasource:
    url: jdbc:mysql://mysql:3306/cartdb
    username: user
    password: password

server:
  port: 8083

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
        defaultZone: http://eureka-server:8761/eureka/

springdoc:
  api-docs:
    path: /docs/cart/v3/api-docs