openapi: 3.1.1
info:
  title: Inventory Service API
  version: 1.0.0
servers:
  - url: http://localhost:8084/api/v1/inventory
tags:
  - name: Inventory


paths:
  /set-quantity:
    put:
      tags:
        - Inventory
      description: Set Product Quantity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetQuantityRequest'
      responses:
        '200':
          description: Quantity updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_InventoryResponse'
        '400':
          description: Invalid request
        '500':
          description: Internal server error
  /all:
    get:
      tags:
        - Inventory
      description: Get Inventory of all products
      responses:
        '200':
          description: Inventory retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiResponse_InventoryResponse'
        '400':
          description: Invalid request
        '500':
          description: Internal server error
  /{productId}:
    get:
      tags:
        - Inventory
      description: Get Inventory of a product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Inventory retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_InventoryResponse'
        '400':
          description: Invalid request
        '500':
          description: Internal server error
components:
  schemas:
    ApiResponse_InventoryResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Quantity updated successfully"
        data:
          $ref: '#/components/schemas/InventoryResponse'
        timestamp:
          type: string
          format: date-time
          example: "2024-06-01T12:00:00Z"
    SetQuantityRequest:
      type: object
      properties:
        productId:
          type: string
          example: "ep-product-000"
        quantity:
          type: integer
          example: 100
    InventoryResponse:
      type: object
      properties:
        id:
          type: string
        productId:
          type: string
          example: "ep-product-000"
        totalQuantity:
          type: integer
          example: 100
        AvailableQuantity:
          type: integer
          example: 80
        ReservedQuantity:
          type: integer
          example: 20




