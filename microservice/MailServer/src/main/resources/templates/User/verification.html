<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verification Code</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f6f8; font-family:Arial, sans-serif;">

<div style="width:100%; padding:20px; background-color:#f4f6f8; box-sizing:border-box;">

    <div style="
        max-width:500px;
        margin:0 auto;
        background:#ffffff;
        border-radius:8px;
        padding:30px;
        box-sizing:border-box;
    ">

        <!-- Header -->
        <div style="text-align:center; font-size:20px; font-weight:bold; margin-bottom:20px;">
            Epasal Verification Code
        </div>

        <!-- Message -->
        <div style="font-size:14px; color:#333333; text-align:center; margin-bottom:20px;">
            Use the verification code below to complete your action:
        </div>

        <!-- Code Box -->
        <div style="text-align:center; margin:20px 0;">
            <div style="
                display:inline-block;
                padding:15px 25px;
                font-size:24px;
                font-weight:bold;
                letter-spacing:4px;
                background-color:#f1f5f9;
                border-radius:6px;
                color:#111827;
            ">
                <span th:text="${code}">123456</span>
            </div>
        </div>

        <!-- Footer -->
        <div style="font-size:12px; color:#888888; text-align:center; margin-top:20px;">
            This code will expire soon. If you didn’t request this, you can safely ignore this email.
        </div>


    </div>

</div>


</body>
</html>
