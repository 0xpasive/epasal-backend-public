openapi: 3.1.1
info:
  title: Order Service API
  version: 1.0.0
servers:
  - url: http://localhost:8084/api/v1/orders
tags:
  - name: Orders

paths:
  /place:
    post:
      tags:
        - Orders
      description: Place order
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
      responses:
        '200':
          description: Order placed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_OrderResponse'
        '400':
          description: Invalid order request
        '500':
          description: Internal server error

  /get:
    get:
      tags:
        - Orders
      description: Get Orders of the user
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Orders retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiResponse_OrderResponse'
        '400':
          description: Invalid request
        '500':
          description: Internal server error

  /{id}:
    get:
      tags:
        - Orders
      description: Get order by ID
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "ep-order-456"
      responses:
        '200':
          description: Order retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_OrderResponse'
        '400':
          description: Invalid order ID
        '404':
          description: Order not found
        '500':
          description: Internal server error

  /cancel/{orderId}:
    delete:
      tags:
        - Orders
      description: Cancel an order
      security:
        - bearerAuth: [ ]
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            example: "ep-order-456"
      responses:
        '200':
          description: Order cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_OrderResponse'
        '400':
          description: Invalid order ID
        '404':
          description: Order not found
        '500':
          description: Internal server error


components:
  schemas:
    ApiResponse_OrderResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Order placed successfully"
        data:
          $ref: '#/components/schemas/OrderResponse'
        timestamp:
          type: string
          format: date-time
          example: "2024-06-01T12:00:00Z"


    OrderRequest:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'

    OrderItem:
      type: object
      properties:
        productId:
          type: string
          example: "ep-product-123"
        quantity:
          type: integer
          example: 2

    OrderItemResponse:
      type: object
      properties:
        productName:
          type: string
          example: "Laptop"
        quantity:
          type: integer
          example: 2
        price:
          type: number
          format: float
          example: 999.99

    OrderResponse:
      type: object
      properties:
        orderId:
          type: string
          example: "ep-order-456"
        userId:
          type: string
          example: "314-12e1-4f1a-9c3b-123456789abc"
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemResponse'
        totalAmount:
          type: number
          format: float
          example: 1999.98

        status:
          type: string
          example: "CONFIRMED"

        addressId:
          type: string
          example: "ep-address-789"

        orderDate:
          type: string
          format: date-time
          example: "2024-06-01T12:00:00Z"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: [ ]


