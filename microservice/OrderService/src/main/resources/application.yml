spring:
  application:
    name: OrderService
  jpa:
    hibernate:
      ddl-auto: update
    database: mysql

  docker:
    compose:
      file: microservice/OrderService/order-service-compose.yaml
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: myuser
    password: secret

  datasource:
    url: jdbc:mysql://mysql:3306/orderdb
    username: user
    password: password


server:
  port: 8084

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
        defaultZone: http://eureka-server:8761/eureka/

payment:
  service:
    esewa:
      url: https://rc-epay.esewa.com.np/api/epay/main/v2/form
      secret_key: "${ESEWA_SECRET_KEY}"
      product_code: "EPAYTEST"
      failureUrl: https://epasal-frontend.vercel.app/payment/failure
      successUrl: https://epasal-frontend.vercel.app/payment/success

khalti:
  secret:
    key: "${KHALTI_SECRET_KEY}"
  url: "https://dev.khalti.com/api/v2/"
  return_url: "https//epasal-frontend.vercel.app/payment./khalti/success"
  website_url: "https://epasal-frontend.vercel.app/"

springdoc:
  api-docs:
    path: /docs/order/v3/api-docs


