spring:
  application:
    name: ProductService
  docker:
    compose:
      file: \epasal\microservice\ProductService\prouduct-compose.yaml

  mongodb:
    uri: [REDACTED]
    database: products
  config:
    import: optional:file:.env[.properties]


server:
  port: 8082

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
        defaultZone: http://eureka-server:8761/eureka/
springdoc:
  api-docs:
    path: /docs/products/v3/api-docs

